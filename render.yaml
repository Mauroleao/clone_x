services:
  - type: web
    name: clone-x-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: sh -c "python manage.py migrate --noinput && python manage.py collectstatic --noinput && python run.py"
    envVars:
      - key: DEBUG
        value: "False"
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_HOSTS
        value: "clone-x-gml7.onrender.com,*.onrender.com,localhost,127.0.0.1"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://clone-xx.vercel.app,http://localhost:5173,http://localhost:5174"
    healthCheckPath: /admin/
    autoDeploy: true
